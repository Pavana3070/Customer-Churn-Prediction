{% extends "base.html" %}

{% block title %}Upload Dataset{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto; margin-top: 2rem;">
    <h2 class="card-title text-center"><i class="fa-solid fa-cloud-arrow-up"></i> Upload Dataset</h2>
    <p class="text-center text-muted mb-4" style="color: var(--text-muted);">Please upload your customer dataset in CSV format.</p>
    
    <form action="{{ url_for('upload') }}" method="post" enctype="multipart/form-data">
        <div class="drop-zone">
            <span class="drop-zone__prompt">
                <i class="fa-solid fa-file-csv"></i>
                <span>Drag and drop your CSV file here or click to browse</span>
            </span>
            <input type="file" name="file" class="drop-zone__input" accept=".csv" required>
        </div>
        <div class="mt-4 text-center">
            <button type="submit" class="btn btn-primary" style="width: 100%;">Upload and Continue</button>
        </div>
    </form>
</div>
{% endblock %}
